docker_image:
  name: yourusername/wine-quality-model
  tag: latest
  signed: false  # или true если используете cosign/notary

git_commits:
  # Заполнить после коммитов (последние 5 хешей)
  hashes:
    - abc1234
    - def5678
    - ghi9012
    - jkl3456
    - mno7890

test_coverage:
  total_coverage: 85.5  # заполнить после запуска pytest --cov
  src_coverage: 90.2
  api_coverage: 80.8

security:
  vulnerabilities_critical: 0
  vulnerabilities_high: 0
  last_scan_date: "2024-01-01"