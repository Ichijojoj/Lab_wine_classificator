version: '3.8'

services:
  # Основной сервис с моделью
  wine-api:
    build: .
    container_name: wine-quality-api
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/models/wine_model.pkl
      - SCALER_PATH=/app/models/scaler.pkl
      - METRICS_PATH=/app/models/metrics.pkl
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Сервис для запуска тестов
  test-runner:
    build: .
    container_name: wine-quality-tests
    command: >
      sh -c "
        pip install pytest pytest-cov httpx &&
        pytest tests/ --cov=src --cov=api --cov-report=xml --cov-report=term
      "
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src
      - ./api:/app/api
      - ./models:/app/models:ro
    depends_on:
      - wine-api
    profiles:
      - test

  # Сервис для функциональных тестов по сценарию
  scenario-test:
    build: .
    container_name: wine-quality-scenario-tests
    command: >
      sh -c "
        pip install requests &&
        python scripts/run_scenario_tests.py scenario.json
      "
    volumes:
      - ./scripts:/app/scripts
      - ./scenario.json:/app/scenario.json
      - ./test_results:/app/test_results
    depends_on:
      - wine-api
    profiles:
      - test