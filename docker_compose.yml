version: '3.8'

services:
  wine-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/models/wine_model.pkl
      - FLASK_ENV=production
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  test:
    build: .
    command: pytest tests/ --cov=src --cov-report=xml
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src
      - ./api:/app/api